name: WealthFlow
targets:
  WealthFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WealthFlow/Sources
        createIntermediateGroups: true
      - path: WealthFlow/Resources
    scheme:
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wealthflow.app
        INFOPLIST_FILE: WealthFlow/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        debug:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          PROVISIONING_PROFILE_SPECIFIER: "WealthFlow App Store"
    info:
      path: WealthFlow/Resources/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
